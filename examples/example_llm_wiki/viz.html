<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "example_llm_wiki";
window.BUNDLE = {"nodes": [{"data": {"id": "entities/hackathon-participants", "label": "Hackathon Participants", "type": "persona", "description": "Builders creating AI agent skills for solo founders during the hackathon.", "resource": "", "tags": ["participants", "builders", "opc"], "color": "#94a3b8", "size": 34}}, {"data": {"id": "events/event-overview", "label": "Event Overview", "type": "event", "description": "Overview of the BotLearn OPC Hackathon and its logistics.", "resource": "", "tags": ["botlearn", "hackathon", "opc"], "color": "#94a3b8", "size": 34}}, {"data": {"id": "log", "label": "log", "type": "Unknown", "description": "", "resource": "", "tags": [], "color": "#94a3b8", "size": 32}}, {"data": {"id": "program/judging-and-awards", "label": "Judging And Awards", "type": "reference", "description": "Evaluation criteria and competition rewards for hackathon submissions.", "resource": "", "tags": ["judging", "awards", "leaderboard"], "color": "#94a3b8", "size": 34}}, {"data": {"id": "program/opc-skill-themes", "label": "OPC Skill Themes", "type": "reference", "description": "Recommended One Person Company skill themes and example build ideas.", "resource": "", "tags": ["opc", "themes", "skills"], "color": "#94a3b8", "size": 39}}, {"data": {"id": "workflows/skillhunt-submission-workflow", "label": "SkillHunt Submission Workflow", "type": "workflow", "description": "Steps for claiming credits, installing BotLearn, and publishing a SkillHunt submission.", "resource": "", "tags": ["botlearn", "skillhunt", "workflow"], "color": "#94a3b8", "size": 36}}], "edges": [{"data": {"id": "entities/hackathon-participants__events/event-overview", "source": "entities/hackathon-participants", "target": "events/event-overview"}}, {"data": {"id": "entities/hackathon-participants__program/opc-skill-themes", "source": "entities/hackathon-participants", "target": "program/opc-skill-themes"}}, {"data": {"id": "entities/hackathon-participants__workflows/skillhunt-submission-workflow", "source": "entities/hackathon-participants", "target": "workflows/skillhunt-submission-workflow"}}, {"data": {"id": "entities/hackathon-participants__program/judging-and-awards", "source": "entities/hackathon-participants", "target": "program/judging-and-awards"}}, {"data": {"id": "events/event-overview__program/opc-skill-themes", "source": "events/event-overview", "target": "program/opc-skill-themes"}}, {"data": {"id": "events/event-overview__workflows/skillhunt-submission-workflow", "source": "events/event-overview", "target": "workflows/skillhunt-submission-workflow"}}, {"data": {"id": "events/event-overview__program/judging-and-awards", "source": "events/event-overview", "target": "program/judging-and-awards"}}, {"data": {"id": "log__entities/hackathon-participants", "source": "log", "target": "entities/hackathon-participants"}}, {"data": {"id": "log__program/judging-and-awards", "source": "log", "target": "program/judging-and-awards"}}, {"data": {"id": "log__workflows/skillhunt-submission-workflow", "source": "log", "target": "workflows/skillhunt-submission-workflow"}}, {"data": {"id": "log__program/opc-skill-themes", "source": "log", "target": "program/opc-skill-themes"}}, {"data": {"id": "log__events/event-overview", "source": "log", "target": "events/event-overview"}}, {"data": {"id": "program/judging-and-awards__program/opc-skill-themes", "source": "program/judging-and-awards", "target": "program/opc-skill-themes"}}, {"data": {"id": "program/judging-and-awards__workflows/skillhunt-submission-workflow", "source": "program/judging-and-awards", "target": "workflows/skillhunt-submission-workflow"}}, {"data": {"id": "program/opc-skill-themes__entities/hackathon-participants", "source": "program/opc-skill-themes", "target": "entities/hackathon-participants"}}, {"data": {"id": "program/opc-skill-themes__program/judging-and-awards", "source": "program/opc-skill-themes", "target": "program/judging-and-awards"}}, {"data": {"id": "workflows/skillhunt-submission-workflow__events/event-overview", "source": "workflows/skillhunt-submission-workflow", "target": "events/event-overview"}}, {"data": {"id": "workflows/skillhunt-submission-workflow__program/judging-and-awards", "source": "workflows/skillhunt-submission-workflow", "target": "program/judging-and-awards"}}], "bodies": {"entities/hackathon-participants": "# Role\n\nHackathon participants are builders creating AI agent skills for solo founders and indie operators.\n\n# Responsibilities\n\n- Select an OPC pain point and theme.\n- Build a working agent skill with repeatable value.\n- Install BotLearn, claim an agent, and publish the skill to SkillHunt.\n- Demo the skill live to judges.\n- Continue competing during the one-week leaderboard period.\n\n# Needs\n\nParticipants need event logistics, platform setup steps, API credits, theme guidance, and clear judging expectations.\n\n# Relationships\n\nParticipants attend the [Event Overview](../events/event-overview.md), choose from [OPC Skill Themes](../program/opc-skill-themes.md), execute the [SkillHunt Submission Workflow](../workflows/skillhunt-submission-workflow.md), and target [Judging And Awards](../program/judging-and-awards.md) criteria.\n\n# Citations\n\n- Source Google Doc: https://docs.google.com/document/d/1XMnL9akJnXxP0Mj0BvHO834tba08CpST7fStxwimjgg/edit?tab=t.0", "events/event-overview": "# Overview\n\nBotLearn OPC Hackathon, branded as The Super Solo AI Agent Skills Hack Day Bay Area 2026, is a live build-and-demo event for AI agent skills serving One Person Company founders.\n\n# Details\n\n- Date: Saturday, June 20, 2026.\n- Time: 1:00 PM to 7:00 PM PT.\n- Venue: Inference.ai, 333 Twin Dolphin Dr, Redwood City, CA 94065.\n- Host: BotLearn.ai.\n- Co-hosts: Inference.ai and SSG Accelerator.\n\n# Relationships\n\nParticipants build skills aligned with [OPC Skill Themes](../program/opc-skill-themes.md), follow the [SkillHunt Submission Workflow](../workflows/skillhunt-submission-workflow.md), and are evaluated using the [Judging And Awards](../program/judging-and-awards.md) expectations.\n\n# Citations\n\n- Source Google Doc: https://docs.google.com/document/d/1XMnL9akJnXxP0Mj0BvHO834tba08CpST7fStxwimjgg/edit?tab=t.0\n- Event details: https://www.botlearn.ai/en/events/super-solo-hack-day", "log": "# Directory Update Log\n\n## 2026-06-20\n* **Creation**: Established the [Hackathon Participants](entities/hackathon-participants.md).\n* **Creation**: Established the [Judging And Awards](program/judging-and-awards.md).\n* **Creation**: Established the [SkillHunt Submission Workflow](workflows/skillhunt-submission-workflow.md).\n* **Creation**: Established the [OPC Skill Themes](program/opc-skill-themes.md).\n* **Creation**: Established the [Event Overview](events/event-overview.md).\n* **Initialization**: Initialized OKF bundle at `/root/example_llm_wiki`.\n", "program/judging-and-awards": "# Evaluation\n\nWinning skills should solve a specific OPC pain point, produce verifiable high-quality autonomous results, and be installable and runnable by real users on day one.\n\n# Criteria\n\n- Clear One Person Company use case.\n- Repeatable autonomous value rather than a toy demo.\n- Verifiable output quality.\n- Day-one installability and usability.\n- Live demo quality before judges, VCs, and industry experts.\n\n# Awards\n\nThe event offers live judge feedback, BotLearn certification for qualifying submissions, API credit prize packages for top performers, and a one-week live leaderboard after the in-person event.\n\n# Relationships\n\nJudging criteria apply to all [OPC Skill Themes](opc-skill-themes.md) and completed [SkillHunt Submission Workflow](../workflows/skillhunt-submission-workflow.md) entries.\n\n# Citations\n\n- Source Google Doc: https://docs.google.com/document/d/1XMnL9akJnXxP0Mj0BvHO834tba08CpST7fStxwimjgg/edit?tab=t.0", "program/opc-skill-themes": "# Themes\n\nThe hackathon focuses on Super Solo founders and recommends seven OPC scenarios, while also allowing creative topics beyond the recommended list.\n\n# Schema\n\n- `theme`: Skill scenario category.\n- `what_to_build`: Suggested agent skill pattern.\n- `opc_pain_point`: Solo-founder problem area addressed by the skill.\n\n# Examples\n\n| theme | what_to_build | opc_pain_point |\n| --- | --- | --- |\n| Content Production Automation | Cross-platform content rewriter, trending-topic analyzer, content calendar auto-planner | Publishing consistently across channels |\n| Customer Acquisition and Follow-up | Cold email sequencer, LinkedIn outreach skill, follow-up reminders with CRM updates | Turning leads into conversations |\n| Workflow Automation | n8n workflow wrapper agent, multi-step API chaining tool, automated task scheduler | Reducing repeated operational work |\n| Customer Service | Smart FAQ agent, after-sales follow-up automation, feedback triage with auto-reply | Handling support without a team |\n| Knowledge Management and Research | Research brief generator, meeting notes to action list, cross-document synthesis | Turning scattered information into decisions |\n| Finance and Admin | Invoice sorting agent, contract drafting skill, monthly finance digest generator | Keeping back-office tasks current |\n| Personal Brand Growth | Social metrics monitor, fan engagement reply skill, growth analyzer | Building public trust and audience |\n| Creative Topics | Build anything useful beyond the recommended themes | Open-ended founder leverage |\n\n# Relationships\n\nThemes guide the expected solution space for [Hackathon Participants](../entities/hackathon-participants.md) and shape demos assessed in [Judging And Awards](judging-and-awards.md).\n\n# Citations\n\n- Source Google Doc: https://docs.google.com/document/d/1XMnL9akJnXxP0Mj0BvHO834tba08CpST7fStxwimjgg/edit?tab=t.0", "workflows/skillhunt-submission-workflow": "# Workflow\n\nBefore entering the competition, a participant needs a BotLearn account, a claimed agent, and a skill published on SkillHunt.\n\n# Steps\n\n1. Claim Inference.ai API credit using the in-person promo code.\n2. Sign in at agents.inference.ai with the registration email.\n3. Open Settings, API Access, and the console, then redeem the promo code under Billing.\n4. Create an API key under API Keys when ready to build.\n5. Send the BotLearn installation prompt to an AI agent.\n6. Follow BotLearn onboarding instructions, claim the bot, build the skill, and upload it to SkillHunt.\n\n# Inputs\n\n- Registration email.\n- In-person Inference.ai promo code.\n- AI agent capable of installing BotLearn.\n- Skill package ready to publish.\n\n# Outputs\n\n- Claimed BotLearn agent.\n- Published SkillHunt submission.\n- Installed, runnable AI agent skill connected to the competition.\n\n# Relationships\n\nThis workflow operationalizes the [Event Overview](../events/event-overview.md) and prepares submissions for [Judging And Awards](../program/judging-and-awards.md).\n\n# Citations\n\n- Inference.ai API key walkthrough: https://agents.inference.ai/docs/api-keys\n- BotLearn Skill instructions: https://www.botlearn.ai/SKILL.md\n- BotLearn home: https://www.botlearn.ai/en/home\n- Source Google Doc: https://docs.google.com/document/d/1XMnL9akJnXxP0Mj0BvHO834tba08CpST7fStxwimjgg/edit?tab=t.0"}, "types": ["Unknown", "event", "persona", "reference", "workflow"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
